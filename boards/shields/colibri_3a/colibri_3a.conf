# Enable GPIO Expander support
CONFIG_GPIO_TCA6424A=y

# Enable EEPROM support
CONFIG_EEPROM=y
CONFIG_EEPROM_AT24=y

# TCA9548A multiplexer init ordering.
# Root must come up before its channels (root < channel).
CONFIG_I2C_TCA954X_ROOT_INIT_PRIO=60
CONFIG_I2C_TCA954X_CHANNEL_INIT_PRIO=61

# TCA6424A io-expander init ordering.
CONFIG_GPIO_TCA6424A_INIT_PRIORITY=70

# SPI init ordering
CONFIG_SPI_INIT_PRIORITY=80

# WS2812B LED strip on LED_STATUS
CONFIG_WS2812_PWM=y
CONFIG_WS2812_PWM_STM32=y
CONFIG_DMA=y
CONFIG_DMA_STM32=y
